<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>LogiTrack Reports</title>

<style>

/* Background */

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #0b1d2a;
    color: white;
}

/* Container */

.main-container {
    padding: 25px;
}

/* Header */

.page-header h1 {
    font-size: 30px;
}

.page-header p {
    color: #9bb3c9;
}

/* Summary Cards */

.summary-cards {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: #112a3a;
    padding: 18px;
    border-radius: 12px;
}

.card h3 {
    color: #9bb3c9;
    font-size: 14px;
}

.card h2 {
    margin-top: 8px;
}

/* Form Section */

.section {
    background: #112a3a;
    padding: 20px;
    border-radius: 12px;
    margin-top: 25px;
}

.section h2 {
    margin-bottom: 15px;
}

/* Inputs */

.input-row {
    display: grid;
    grid-template-columns: repeat(5,1fr);
    gap: 12px;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #1f4d6b;
    background: #0b1d2a;
    color: white;
}

/* Button */

.add-btn {
    margin-top: 15px;
    padding: 10px 18px;
    background: #00bfff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.add-btn:hover {
    background: #009acd;
}

/* Table */

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th {
    background: #0b1d2a;
    color: #00bfff;
    padding: 12px;
}

td {
    padding: 12px;
    border-bottom: 1px solid #1f4d6b;
}

</style>

</head>

<body>

<div class="main-container">

<!-- Header -->

<div class="page-header">
<h1>Incident Reports</h1>
<p>Enter incidents and monitor logistics disruptions.</p>
</div>

<!-- Summary Cards -->

<div class="summary-cards">

<div class="card">
<h3>Total Incidents</h3>
<h2 id="totalIncidents">0</h2>
</div>

<div class="card">
<h3>Route Blockages</h3>
<h2 id="blockages">0</h2>
</div>

<div class="card">
<h3>Delayed Shipments</h3>
<h2 id="delays">0</h2>
</div>

<div class="card">
<h3>Active Alerts</h3>
<h2 id="alerts">0</h2>
</div>

</div>

<!-- Entry Form -->

<div class="section">

<h2>Add New Incident</h2>

<div class="input-row">

<input id="id" placeholder="Incident ID">

<input id="location" placeholder="Location">

<select id="type">
<option>Blockage</option>
<option>Delay</option>
<option>Damage</option>
<option>Breakdown</option>
</select>

<select id="severity">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<select id="status">
<option>Active</option>
<option>Resolved</option>
</select>

</div>

<button class="add-btn"
onclick="addIncident()">
Add Incident
</button>

</div>

<!-- Table -->

<div class="section">

<h2>Incident Records</h2>

<table>

<thead>

<tr>
<th>ID</th>
<th>Location</th>
<th>Type</th>
<th>Severity</th>
<th>Status</th>
</tr>

</thead>

<tbody id="incidentTable">

</tbody>

</table>

</div>

</div>

<script>

let total = 0;
let blockageCount = 0;
let delayCount = 0;
let activeCount = 0;

function addIncident(){

let id =
document.getElementById("id").value;

let location =
document.getElementById("location").value;

let type =
document.getElementById("type").value;

let severity =
document.getElementById("severity").value;

let status =
document.getElementById("status").value;

if(id === "" || location === ""){
alert("Please fill all fields");
return;
}

/* Add row */

let table =
document.getElementById("incidentTable");

let row = table.insertRow();

row.insertCell(0).innerText = id;
row.insertCell(1).innerText = location;
row.insertCell(2).innerText = type;
row.insertCell(3).innerText = severity;
row.insertCell(4).innerText = status;

/* Update counts */

total++;

if(type === "Blockage")
blockageCount++;

if(type === "Delay")
delayCount++;

if(status === "Active")
activeCount++;

document.getElementById("totalIncidents").innerText = total;

document.getElementById("blockages").innerText =
blockageCount;

document.getElementById("delays").innerText =
delayCount;

document.getElementById("alerts").innerText =
activeCount;

/* Clear fields */

document.getElementById("id").value = "";
document.getElementById("location").value = "";

}

</script>

</body>
</html>
